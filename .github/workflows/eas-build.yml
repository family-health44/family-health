# .github/workflows/eas-build.yml
# CI/CD pipeline — runs on push to main and PRs.
# Secrets required in GitHub repo settings:
#   EXPO_TOKEN          — from expo.dev account settings
#   EXPO_PUBLIC_SUPABASE_URL    — set as EAS secret too
#   EXPO_PUBLIC_SUPABASE_ANON_KEY — set as EAS secret too

name: EAS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Type check + lint on every PR and push ────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
  # ── Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test -- --coverage

  # ── EAS Preview build on main ─────────────────────────────────────────────
  build-preview:
    name: EAS Preview build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build preview (iOS)
        run: eas build --platform ios --profile preview --non-interactive

      - name: Build preview (Android)
        run: eas build --platform android --profile preview --non-interactive
