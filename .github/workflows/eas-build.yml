# .github/workflows/eas-build.yml
# CI/CD — MANUAL ONLY (workflow_dispatch). Nothing runs automatically on push,
# so no failed-build / failed-test emails during day-to-day development.
# Run it deliberately from the GitHub Actions tab before a release build.
# Secrets required in GitHub repo settings:
#   EXPO_TOKEN, EXPO_PUBLIC_SUPABASE_URL, EXPO_PUBLIC_SUPABASE_ANON_KEY

name: EAS Build

on:
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Run tests
        run: npm test -- --coverage

  build-preview:
    name: EAS Preview build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build preview (iOS)
        run: eas build --platform ios --profile preview --non-interactive
      - name: Build preview (Android)
        run: eas build --platform android --profile preview --non-interactive
